openapi: 3.0.3
info:
  title: Admin API
  version: 1.0.0
paths:
  /user/{id}:
    put:
      summary: Update a user
      operationId: updateUser
      tags:
        - users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDto'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '404':
          description: User not found

  /events/payments:
    post:
      summary: Send a payment event
      operationId: processPaymentEvent
      tags:
        - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentEventDto'
      responses:
        '200':
          description: Payment event processed successfully

  /events/notifications:
    post:
      summary: Send a notification event
      operationId: processNotificationEvent
      tags:
        - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationEventDto'
      responses:
        '200':
          description: Notification event processed successfully

components:
  schemas:
    UserDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        isStaff:
          type: boolean

    PaymentEventDto:
      type: object
      properties:
        transactionId:
          type: string
        userId:
          type: string
        amount:
          type: number
        paymentMethod:
          type: string
        currency:
          type: string
        timestamp:
          type: string
          format: date-time

    NotificationEventDto:
      type: object
      properties:
        recipient:
          type: string
        messageBody:
          type: string
        channelType:
          type: string
        sender:
          type: string
        subject:
          type: string
        timestamp:
          type: string
          format: date-time
